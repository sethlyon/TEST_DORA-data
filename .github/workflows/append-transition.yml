name: Append Jira Transition

on:
  repository_dispatch:
    types: [jira-transition]

permissions:
  contents: write

jobs:
  append:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append and push (with retry)
        run: |
          git config user.name "jira-automation[bot]"
          git config user.email "jira-automation[bot]@users.noreply.github.com"

          EVENT='${{ toJson(github.event.client_payload) }}'

          # Derive sprint from ts using sprints.json lookup
          SPRINT=$(echo "$EVENT" | jq -r --slurpfile sprints data/sprints.json '
            .ts[:10] as $date |
            ($sprints[0] | map(select($date >= .start and $date < .end)) | .[0].name) // "Unknown"
          ')
          echo "Derived sprint: $SPRINT"

          NEW_ENTRY=$(echo "$EVENT" | jq -c --arg sprint "$SPRINT" '{
            ts: .ts,
            key: .key,
            from: .from,
            to: .to,
            project: .project,
            issue_type: .issue_type,
            primary_app: .primary_app,
            it_queue: .it_queue,
            implementer: .implementer,
            transitioner: .transitioner,
            sprint: $sprint
          }')

          for attempt in 1 2 3 4 5; do
            # Always start from latest remote
            git fetch origin main
            git reset --hard origin/main

            # Append to JSON array
            jq --argjson entry "$NEW_ENTRY" '. += [$entry]' data/transitions.json > data/transitions.tmp \
              && mv data/transitions.tmp data/transitions.json

            # Regenerate deploys-by-sprint.json (pre-aggregated for dashboard)
            jq --slurpfile sprints data/sprints.json '
              [.[] | select(.to == "Deploying")] | group_by(.sprint) |
              map({sprint: .[0].sprint, deployments: length}) as $counts |
              [$sprints[0][] | {sprint: .name, deployments: ([$counts[] | select(.sprint == .sprint)] | .[0].deployments // 0)}]
            ' data/transitions.json > data/deploys-by-sprint.tmp

            # Simpler regeneration using sprints as base
            jq -n --slurpfile sprints data/sprints.json --slurpfile trans data/transitions.json '
              [$sprints[0][] | .name as $name | {
                sprint: $name,
                deployments: [$trans[0][] | select(.to == "Deploying" and .sprint == $name)] | length
              }]
            ' > data/deploys-by-sprint.json

            git add data/transitions.json data/deploys-by-sprint.json
            git commit -m "feat: transition ${{ github.event.client_payload.key }} -> ${{ github.event.client_payload.to }}"

            if git push origin main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi

            echo "Push failed (attempt $attempt), retrying..."
            sleep $((attempt * 2))
          done

          echo "Failed after 5 attempts"
          exit 1
